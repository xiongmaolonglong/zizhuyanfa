# ============================================
# 广告工程全流程管理系统 - Nginx 配置
# ============================================
#
# 部署方案：单域名 + 子路径区分前端
#   /              → 管理后台（admin-web）
#   /super-admin/  → 超级管理后台
#   /client/       → 甲方客户端
#   /api/*         → 后端 API（统一代理）
#   /uploads/*     → 上传文件静态访问
#
# 使用方法:
# 1. 复制此文件到 /etc/nginx/sites-available/ad-workflow
# 2. 创建软链接: ln -s /etc/nginx/sites-available/ad-workflow /etc/nginx/sites-enabled/
# 3. 将 your-domain.com 替换为你的实际域名
# 4. 测试配置: nginx -t
# 5. 重载 Nginx: nginx -s reload
#
# SSL 配置建议使用 certbot 自动配置:
# certbot --nginx -d your-domain.com
# ============================================

# 后端 API 上游
upstream backend_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP 重定向到 HTTPS (启用 SSL 后取消注释下面的 server 块，注释掉下面的 HTTP server 块)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

# 主服务器配置
server {
    listen 80;
    # listen 443 ssl http2;  # 启用 SSL 后取消注释
    server_name www.fsbhgg.com fsbhgg.com;

    # SSL 配置 (启用 SSL 后取消注释)
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # 访问日志
    access_log /var/log/nginx/ad-workflow.access.log;
    error_log /var/log/nginx/ad-workflow.error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_comp_level 6;

    # 客户端上传限制
    client_max_body_size 500M;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ============================================
    # 后端 API 代理（优先级最高，必须在前端 location 之前）
    # ============================================
    location /api {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ============================================
    # 上传文件访问
    # ============================================
    location /uploads {
        alias /var/www/ad-workflow/backend/uploads;

        # 禁止执行脚本
        location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
            deny all;
        }

        # 图片缓存
        location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
            expires 30d;
            add_header Cache-Control "public";
        }

        # 禁止访问敏感文件
        location ~* \.(env|git|gitignore|htaccess)$ {
            deny all;
        }
    }

    # ============================================
    # 健康检查
    # ============================================
    location /health {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ============================================
    # 超级管理后台（子路径部署）
    # ============================================
    location /super-admin/ {
        alias /var/www/ad-workflow/super-admin/dist/;
        index index.html;
        try_files $uri $uri/ /super-admin/index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # 甲方客户端（子路径部署）
    # ============================================
    location /client/ {
        alias /var/www/ad-workflow/client-web/dist/;
        index index.html;
        try_files $uri $uri/ /client/index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # 管理后台（根路径，默认前端）
    # ============================================
    location / {
        root /var/www/ad-workflow/admin-web/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
